name: Kernel Driver Contract Check

on:
  push:
    branches: [main]
    paths:
      - '**.c'
      - '**.h'
      - 'validators/**'
      - 'rules/**'
      - 'fixtures/**'
      - 'contract.yaml'
      - 'run_validators.py'
      - 'scan_source.py'
  pull_request:
    branches: [main]
    paths:
      - '**.c'
      - '**.h'
      - 'validators/**'
      - 'rules/**'
      - 'fixtures/**'
      - 'contract.yaml'
      - 'run_validators.py'
      - 'scan_source.py'

jobs:
  # ── Job 1: Self-test — always runs against bundled fixtures ──────────────
  fixture-selftest:
    name: Fixture Self-Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run validators against all fixtures
        id: fixture_check
        # Use || true so that violation fixtures detecting violations (exit 1)
        # do not abort the step — the summarise step evaluates correctness.
        run: |
          python run_validators.py fixtures/ --json > fixture_results.json || true

      - name: Upload fixture results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fixture-results
          path: fixture_results.json

      - name: Summarise fixture results
        if: always()
        run: |
          python - <<'EOF'
          import json, sys, os

          # Hard failure (blocks CI): compliant fixture reports violations (false positive).
          # Warning only (non-blocking): violation fixture misses violations (false negative
          #   indicates a validator gap, tracked separately from the CI gate).

          path = "fixture_results.json"
          if not os.path.exists(path) or os.path.getsize(path) == 0:
              print("ERROR: fixture_results.json is missing or empty")
              sys.exit(1)

          data = json.load(open(path))
          hard_failures = []
          warnings = []

          for f in data["fixtures"]:
              name = os.path.basename(f["fixture"])
              passed = f.get("passed", False)
              is_violation = "_violation" in name

              if not is_violation and not passed:
                  hard_failures.append(f"FALSE POSITIVE: {name} is a compliant fixture but reported violations")
              elif is_violation and passed:
                  warnings.append(f"FALSE NEGATIVE: {name} should detect violations but passed clean (validator gap)")

          compliant = [f for f in data["fixtures"] if "_compliant" in os.path.basename(f["fixture"])]
          violation = [f for f in data["fixtures"] if "_violation" in os.path.basename(f["fixture"])]
          print(f"### Fixture Self-Test: {len(compliant)} compliant, {len(violation)} violation fixtures")

          for f in data["fixtures"]:
              name = os.path.basename(f["fixture"])
              is_violation = "_violation" in name
              passed = f.get("passed", False)
              if is_violation:
                  icon = "✅" if not passed else "⚠️"
                  label = "correctly detected violations" if not passed else "missed violations (gap)"
              else:
                  icon = "✅" if passed else "❌"
                  label = "clean" if passed else "FALSE POSITIVE — should be clean"
              print(f"{icon} `{name}` — {label}")
              for r in f.get("results", []):
                  for v in r.get("violations", []):
                      print(f"   - **{r['validator']}**: {v}")

          if warnings:
              print("\n⚠️  Validator gaps (non-blocking):")
              for w in warnings:
                  print(f"  {w}")

          if hard_failures:
              print("\n❌ Hard failures (blocking):")
              for msg in hard_failures:
                  print(f"  {msg}")
              sys.exit(1)
          else:
              print(f"\n✅ No false positives. All compliant fixtures are clean.")
          EOF

  # ── Job 2: Scan changed .c/.h files in PR ────────────────────────────────
  source-scan:
    name: Source Scan (changed files)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history to diff

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Find changed C/H source files
        id: changed
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          FILES=$(git diff --name-only "$BASE" "$HEAD" | grep -E '\.(c|h)$' || true)
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES"     >> "$GITHUB_OUTPUT"
          echo "EOF"        >> "$GITHUB_OUTPUT"
          echo "count=$(echo "$FILES" | grep -c . || echo 0)" >> "$GITHUB_OUTPUT"

      - name: Scan changed source files
        if: steps.changed.outputs.count != '0'
        run: |
          mkdir -p scan_output/pr
          echo "${{ steps.changed.outputs.files }}" | while IFS= read -r f; do
            [ -z "$f" ] && continue
            [ -f "$f" ] || continue
            python scan_source.py "$f" --output-dir scan_output/pr
          done

      - name: Run validators on scanned output
        if: steps.changed.outputs.count != '0'
        run: |
          python run_validators.py scan_output/pr/ --json > pr_scan_results.json
          cat pr_scan_results.json

      - name: Annotate PR with violations
        if: steps.changed.outputs.count != '0'
        run: |
          python - <<'EOF'
          import json, sys, os

          path = "pr_scan_results.json"
          if not os.path.exists(path):
              print("No scan results found.")
              sys.exit(0)

          data = json.load(open(path))
          has_violation = False

          print("## Kernel Driver Contract — Source Scan Results\n")
          for fixture in data.get("fixtures", []):
              src = fixture.get("fixture", "?")
              passed = fixture.get("passed", True)
              icon = "✅" if passed else "❌"
              print(f"{icon} **{src}**")
              for r in fixture.get("results", []):
                  for v in r.get("violations", []):
                      print(f"  - 🚫 `{r['validator']}`: {v}")
                      has_violation = True
                  for w in r.get("warnings", []):
                      print(f"  - ⚠️  `{r['validator']}`: {w}")

          if has_violation:
              print("\n> ❌ Hard-stop violations detected — merge blocked.")
              sys.exit(1)
          else:
              print("\n> ✅ All hard-stop checks passed.")
          EOF

      - name: Upload PR scan results
        uses: actions/upload-artifact@v4
        if: always() && steps.changed.outputs.count != '0'
        with:
          name: pr-scan-results
          path: |
            pr_scan_results.json
            scan_output/pr/

      - name: No C/H files changed
        if: steps.changed.outputs.count == '0'
        run: echo "No .c/.h files changed in this PR — source scan skipped."

  # ── Job 3: Full scan on push to main ────────────────────────────────────
  full-scan:
    name: Full Source Scan (main)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scan all C/H files in repository
        run: |
          find . -name "*.c" -o -name "*.h" \
            | grep -v -E '\./external/|\./scan_output/|/__pycache__/' \
            | sort > source_list.txt
          COUNT=$(wc -l < source_list.txt)
          echo "Found $COUNT source files"
          if [ "$COUNT" -gt 0 ]; then
            mkdir -p scan_output/full
            while IFS= read -r f; do
              python scan_source.py "$f" --output-dir scan_output/full
            done < source_list.txt
          fi

      - name: Run validators on full scan output
        run: |
          if [ -d scan_output/full ] && [ "$(ls -A scan_output/full)" ]; then
            python run_validators.py scan_output/full/ --json > full_scan_results.json
          else
            echo '{"overall_pass": true, "fixtures": []}' > full_scan_results.json
          fi

      - name: Upload full scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: full-scan-results
          path: |
            full_scan_results.json
            scan_output/full/
