name: kernel-driver-contract
plugin_version: "1.0.0"
framework_interface_version: "1"
framework_compatible: ">=1.0.0,<2.0.0"
domain: kernel-driver
applies_to:
  - kernel
  - driver
  - wdm
  - wdf
  - kmdf
documents:
  - KERNEL_DRIVER_CHECKLIST.md
  - KERNEL_DRIVER_ARCHITECTURE.md
rule_roots:
  - rules
ai_behavior_override:
  - AGENTS.md
validators:
  - validators/irql_safety_validator.py
  - validators/pool_type_validator.py
  - validators/sync_primitive_validator.py
  - validators/dpc_isr_validator.py
  - validators/pageable_section_validator.py
  - validators/dispatch_routine_validator.py
  - validators/static_analysis_validator.py
hard_stop_rules:
  - KD-002
  - KD-003
  - KD-006
  - KD-007
  - KD-010
ci_runner: run_validators.py
