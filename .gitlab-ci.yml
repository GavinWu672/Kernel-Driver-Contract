image: python:3.11

stages:
  - selftest
  - scan
  - precision

variables:
  SCAN_OUT_PR:   scan_output/mr
  SCAN_OUT_FULL: scan_output/full
  # Precision regression thresholds
  # Coverage: 100% (extraction must be complete across all GT files)
  # Accuracy: 85% reflects aggregate KMDF+WDM baseline (88.1% current);
  #   KMDF-only path is 100% — the WDM gap is structural and documented.
  #   Raise this threshold only after WDM registration-site tracking is added.
  PRECISION_MIN_COVERAGE: "1.0"
  PRECISION_MIN_ACCURACY: "0.85"

# ── Stage 1: Fixture self-test — always runs ─────────────────────────────────
fixture-selftest:
  stage: selftest
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - python run_validators.py fixtures/ --json | tee fixture_results.json
    - |
      python - <<'EOF'
      import json, sys
      data = json.load(open("fixture_results.json"))
      total  = len(data["fixtures"])
      passed = sum(1 for f in data["fixtures"] if f.get("passed"))
      print(f"Fixture self-test: {passed}/{total} passed")
      for f in data["fixtures"]:
          icon = "PASS" if f.get("passed") else "FAIL"
          print(f"  [{icon}] {f['fixture']}")
          for r in f.get("results", []):
              for v in r.get("violations", []):
                  print(f"        VIOLATION [{r['validator']}]: {v}")
      if not data["overall_pass"]:
          sys.exit(1)
      EOF
  artifacts:
    when: always
    paths:
      - fixture_results.json
    reports:
      junit: fixture_results.json
    expire_in: 7 days

# ── Stage 1b: Precision regression gate — push to main only ──────────────────
precision-baseline:
  stage: selftest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_COMMIT_BRANCH == "master" && $CI_PIPELINE_SOURCE == "push"'
  script:
    - |
      python check_precision.py \
        --batch ground_truth/*.json \
        --wdf-dirs external/wds2/general/pcidrv/kmdf/HW \
                   external/wds2/input/kbfiltr/sys \
                   external/wds2/general/cancel/sys \
        --min-coverage "$PRECISION_MIN_COVERAGE" \
        --min-accuracy "$PRECISION_MIN_ACCURACY"
  artifacts:
    when: always
    paths:
      - ground_truth/
    expire_in: 30 days

# ── Stage 2a: Scan changed files on Merge Request ────────────────────────────
mr-source-scan:
  stage: scan
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - mkdir -p "$SCAN_OUT_PR"
    # Find changed .c/.h files in this MR
    - |
      git fetch origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME" 2>/dev/null || true
      CHANGED=$(git diff --name-only "origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"...HEAD \
                | grep -E '\.(c|h)$' || true)
      if [ -z "$CHANGED" ]; then
        echo "No .c/.h files changed in this MR — skipping source scan."
        exit 0
      fi
      echo "Changed files:"
      echo "$CHANGED"
      while IFS= read -r f; do
        [ -f "$f" ] || continue
        python scan_source.py "$f" --output-dir "$SCAN_OUT_PR"
      done <<< "$CHANGED"
    - |
      if [ -z "$(ls -A $SCAN_OUT_PR 2>/dev/null)" ]; then
        echo "No payloads generated — skipping validator run."
        exit 0
      fi
    - python run_validators.py "$SCAN_OUT_PR/" --json | tee mr_scan_results.json
    - |
      python - <<'EOF'
      import json, sys, os
      path = "mr_scan_results.json"
      if not os.path.exists(path):
          sys.exit(0)
      data = json.load(open(path))
      has_violation = False
      print("=== Kernel Driver Contract — MR Source Scan ===")
      for fixture in data.get("fixtures", []):
          src     = fixture.get("fixture", "?")
          passed  = fixture.get("passed", True)
          icon    = "PASS" if passed else "FAIL"
          print(f"[{icon}] {src}")
          for r in fixture.get("results", []):
              for v in r.get("violations", []):
                  print(f"      VIOLATION [{r['validator']}]: {v}")
                  has_violation = True
              for w in r.get("warnings", []):
                  print(f"      warning   [{r['validator']}]: {w}")
      if has_violation:
          print("\nHard-stop violations detected — MR blocked.")
          sys.exit(1)
      else:
          print("\nAll hard-stop checks passed.")
      EOF
  artifacts:
    when: always
    paths:
      - mr_scan_results.json
      - scan_output/mr/
    expire_in: 7 days

# ── Stage 2b: Full scan on push to main/master ───────────────────────────────
full-source-scan:
  stage: scan
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_COMMIT_BRANCH == "master" && $CI_PIPELINE_SOURCE == "push"'
  script:
    - mkdir -p "$SCAN_OUT_FULL"
    - |
      find . -name "*.c" -o -name "*.h" \
        | grep -v -E '\./external/|\./scan_output/|/__pycache__/' \
        | sort > source_list.txt
      COUNT=$(wc -l < source_list.txt | tr -d ' ')
      echo "Found $COUNT source file(s)"
      if [ "$COUNT" -gt 0 ]; then
        while IFS= read -r f; do
          python scan_source.py "$f" --output-dir "$SCAN_OUT_FULL" 2>/dev/null || true
        done < source_list.txt
      fi
    - |
      if [ -z "$(ls -A $SCAN_OUT_FULL 2>/dev/null)" ]; then
        echo "No payloads generated."
        exit 0
      fi
      python run_validators.py "$SCAN_OUT_FULL/" --json | tee full_scan_results.json
  artifacts:
    when: always
    paths:
      - full_scan_results.json
      - scan_output/full/
    expire_in: 14 days
